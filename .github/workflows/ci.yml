name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ========== 1. 代码质量检查 / Code Quality ==========
  lint:
    name: 🧹 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python linting tools
        run: |
          pip install ruff black isort

      - name: Run Ruff (Python linter)
        run: |
          ruff check . --output-format=github || true

      - name: Check Python formatting
        run: |
          black --check . || true

      - name: Check import sorting
        run: |
          isort --check-only . || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install markdownlint
        run: |
          npm install -g markdownlint-cli

      - name: Run markdownlint
        run: |
          markdownlint '**/*.md' --ignore node_modules --ignore dist || true

  # ========== 2. 链接检查 / Link Check ==========
  link-check:
    name: 🔗 Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check links in Markdown files
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            './**/*.md'
          fail: false

      - name: Upload link check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-results
          path: lychee/out.md

  # ========== 3. 拼写检查 / Spell Check ==========
  spell-check:
    name: 📝 Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run codespell
        uses: codespell-project/actions-codespell@v2
        with:
          check_filenames: true
          check_hidden: false
          skip: "*.png,*.jpg,*.gif,*.svg,./.git/*,./node_modules/*,./modules/**/node_modules/*,./**/node_modules/*,*.js.map,*.d.ts"
          ignore_words_list: "dailyclaw,teh,DAA"
          path: "."

  # ========== 4. 构建测试 / Build Test ==========
  build:
    name: 🏗️ Build Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Test Makefile targets
        run: |
          echo "📋 测试 Makefile..."
          make help || echo "⚠️ help 目标有问题"
          echo "📊 查看项目状态..."
          make status || echo "⚠️ status 目标有问题"

      - name: Verify project structure
        run: |
          echo "📁 检查项目结构..."
          test -d docs || echo "⚠️ docs 目录不存在"
          test -d modules || echo "⚠️ modules 目录不存在"
          test -f README.md || echo "⚠️ README.md 不存在"
          test -f LICENSE || echo "⚠️ LICENSE 不存在"
          test -f CONTRIBUTING.md || echo "⚠️ CONTRIBUTING.md 不存在"
          echo "✅ 项目结构检查完成"

  # ========== 5. 语义检查 / Semantic Checks ==========
  semantic:
    name: 📋 Semantic PR Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            core
            docs
            modules
            ui
            api
            deps
            config
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with an uppercase character.

  # ========== 6. 总结 / Summary ==========
  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [lint, link-check, spell-check, build]
    if: always()
    steps:
      - name: Generate CI summary
        run: |
          echo "# 🐱 DailyClaw CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Link Check | ${{ needs.link-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Spell Check | ${{ needs.spell-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Test | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All checks completed! 🎉" >> $GITHUB_STEP_SUMMARY
