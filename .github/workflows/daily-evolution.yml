name: Daily Evolution

on:
  schedule:
    # 每天 0:00 UTC 运行 (北京时间 8:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up date
        id: date
        run: |
          echo "YEAR=$(date +%Y)" >> $GITHUB_ENV
          echo "MONTH=$(date +%m)" >> $GITHUB_ENV
          echo "DAY=$(date +%d)" >> $GITHUB_ENV
          echo "DATE_STR=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Create daily evolution record
        run: |
          YEAR_DIR="evolution/${{ env.YEAR }}"
          MONTH_DIR="$YEAR_DIR/${{ env.MONTH }}"
          mkdir -p "$MONTH_DIR"
          
          FILE="$MONTH_DIR/${{ env.DAY }}.md"
          
          if [ ! -f "$FILE" ]; then
            cat > "$FILE" << 'EOF'
          # Daily Evolution - ${{ env.DATE_STR }}

          ## 🎯 Today's Focus
          <!-- 记录今天的主要目标 -->

          ## ✅ Completed
          <!-- 已完成的事项 -->

          ## 🔄 In Progress
          <!-- 进行中的事项 -->

          ## 💡 Insights
          <!-- 今日感悟/新发现 -->

          ## 📊 Metrics
          <!-- 量化指标 -->

          ---
          *Auto-generated by DailyClaw Evolution System*
          EOF
            echo "Created $FILE"
          else
            echo "$FILE already exists, skipping"
          fi

      - name: Update PROGRESS.md summary
        run: |
          if ! grep -q "${{ env.DATE_STR }}" PROGRESS.md; then
            echo "" >> PROGRESS.md
            echo "- ${{ env.DATE_STR }}: [查看详情](evolution/${{ env.YEAR }}/${{ env.MONTH }}/${{ env.DAY }}.md)" >> PROGRESS.md
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Daily evolution: ${{ env.DATE_STR }}"
          git push